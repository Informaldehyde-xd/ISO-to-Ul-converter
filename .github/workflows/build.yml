name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'

      - name: Auto-Generate Clean Project Layout
        run: |
          # Back up your converter code file
          cp lib/main.dart current_main.dart
          cp pubspec.yaml current_pubspec.yaml
          
          # Delete the hand-made broken files safely
          rm -rf android lib pubspec.yaml
          
          # Force Flutter to build a perfectly configured template project
          flutter create --org com.example --project-name iso_to_ul_converter .
          
          # Inject your specific conversion logic back into the fresh app layout
          cp current_main.dart lib/main.dart
          
          # Re-apply the required offline file picker settings
          sed -i '/dependencies:/a \  file_picker: ^8.0.0' pubspec.yaml

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-pub

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iso-to-ul-converter-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
